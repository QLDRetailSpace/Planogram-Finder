<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QLD Metcash - Planogram Directory</title>

<style>

body{
  font-family: Arial;
  margin:0;
  background:#f4f6f8;
}

/* HEADER */

.header{
  background:#0b57d0;
  color:white;
  padding:18px 20px;
  box-shadow:0 3px 6px rgba(0,0,0,0.15);
}

.header-inner{
  max-width:1000px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:15px;
}

.header img{
  height:50px;
  border-radius:6px;
}

.header h1{
  font-size:20px;
  margin:0;
  font-weight:600;
}

/* PAGE CONTENT */

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* INPUTS */

select, input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

label{
  font-weight:bold;
  margin-top:12px;
  display:block;
}

/* CARDS */

.card{
  background:#fff;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.card a{
  text-decoration:none;
  font-weight:bold;
  color:#0b57d0;
}

/* GLOBAL SEARCH */

#globalSearch{
  border:2px solid #0b57d0;
  font-weight:bold;
}

/* MOBILE */

@media (max-width:600px){

  .header-inner{
    flex-direction:column;
    align-items:flex-start;
  }

  .header img{
    height:40px;
  }

}

</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <img src="https://drive.google.com/uc?export=view&id=12wy3gsnLKCWolNeEoe3tz8yup58l6myN">
    <h1>QLD Metcash Planogram Directory</h1>
  </div>
</div>

<div class="container">

<label>🔎 Search All Planograms</label>
<input type="text" id="globalSearch" placeholder="Search all planograms..." onkeyup="runGlobalSearch()">

<label>Channel</label>
<select id="channel" onchange="updateDepartments()"></select>

<label>Department</label>
<select id="department" onchange="updateSubDepartments()"></select>

<label>Sub-Department</label>
<select id="subDepartment" onchange="updateCategories()"></select>

<label>Category</label>
<select id="category" onchange="showFiles()"></select>

<div id="results"></div>

</div>

<script>

// ================= CSV LINK =================
const fileURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPSHnZioYj2Xdxx0CNi5VYlzlm0OL5aWAnr_eI9rSyboMnznDUyJzYt1DZ0Vret_CRqxO2aP8fDy9y/pub?gid=1791414175&single=true&output=csv";

let fileData = [];

// ================= CSV PARSER =================
function parseCSV(text){
  const rows = text.trim().split("\n");
  const headers = rows[0].split(",").map(h => h.replace(/^\uFEFF/, "").trim());

  return rows.slice(1).map(row => {
    const values = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    let obj = {};
    headers.forEach((h,i)=> obj[h] = values[i]?.replace(/"/g,""));
    return obj;
  });
}

// ================= LOAD =================
fetch(fileURL)
.then(r => r.text())
.then(text => {
  fileData = parseCSV(text);
  initChannels();
});

// ================= HEADER KEY DETECTION =================
function getKeys(){
  const keys = Object.keys(fileData[0]);

  return {
    channel: keys.find(k => k.toLowerCase().includes("channel")),
    department: keys.find(k => k.toLowerCase().includes("department") && !k.toLowerCase().includes("sub")),
    subDepartment: keys.find(k => k.toLowerCase().includes("sub")),
    category: keys.find(k => k.toLowerCase().includes("category")),
    file: keys.find(k => k.toLowerCase().includes("file")),
    link: keys.find(k => k.toLowerCase().includes("link"))
  };
}

// ================= CLEAN =================
function clean(v){ return (v||"").toString().toLowerCase().trim(); }

// ================= CHANNEL =================
function initChannels(){
  const k = getKeys();
  const vals = [...new Set(fileData.map(r => r[k.channel]))];

  channel.innerHTML = "<option value=''>Select Channel</option>";
  vals.forEach(v => channel.innerHTML += `<option>${v}</option>`);
}

// ================= DEPARTMENT =================
function updateDepartments(){
  const k = getKeys();

  const vals = [...new Set(
    fileData
      .filter(r => clean(r[k.channel]) === clean(channel.value))
      .map(r => r[k.department])
  )];

  department.innerHTML = "<option value=''>Select Department</option>";
  vals.forEach(v => department.innerHTML += `<option>${v}</option>`);

  subDepartment.innerHTML = "";
  category.innerHTML = "";
  results.innerHTML = "";
}

// ================= SUB-DEPARTMENT =================
function updateSubDepartments(){
  const k = getKeys();

  const vals = [...new Set(
    fileData
      .filter(r =>
        clean(r[k.channel]) === clean(channel.value) &&
        clean(r[k.department]) === clean(department.value)
      )
      .map(r => r[k.subDepartment])
  )];

  subDepartment.innerHTML = "<option value=''>Select Sub-Department</option>";
  vals.forEach(v => subDepartment.innerHTML += `<option>${v}</option>`);

  category.innerHTML = "";
  results.innerHTML = "";
}

// ================= CATEGORY =================
function updateCategories(){
  const k = getKeys();

  const vals = [...new Set(
    fileData
      .filter(r =>
        clean(r[k.channel]) === clean(channel.value) &&
        clean(r[k.department]) === clean(department.value) &&
        clean(r[k.subDepartment]) === clean(subDepartment.value)
      )
      .map(r => r[k.category])
  )];

  category.innerHTML = "<option value=''>Select Category</option>";
  vals.forEach(v => category.innerHTML += `<option>${v}</option>`);

  results.innerHTML = "";
}

// ================= SHOW FILES =================
function showFiles(){
  const k = getKeys();

  const matches = fileData.filter(r =>
    clean(r[k.channel]) === clean(channel.value) &&
    clean(r[k.department]) === clean(department.value) &&
    clean(r[k.subDepartment]) === clean(subDepartment.value) &&
    clean(r[k.category]) === clean(category.value)
  );

  results.innerHTML = "";

  if(matches.length === 0){
    results.innerHTML = "<div class='card'>No files found</div>";
    return;
  }

  matches.forEach(r => {
    results.innerHTML += `
      <div class="card">
        <a href="${r[k.link]}" target="_blank">
          📄 ${r[k.file]}
        </a>
      </div>
    `;
  });
}

// ================= GLOBAL SEARCH =================
function runGlobalSearch(){

  const k = getKeys();
  const term = clean(document.getElementById("globalSearch").value);

  if(term.length < 2){
    results.innerHTML = "";
    return;
  }

  const matches = fileData.filter(r => {

    const text =
      clean(r[k.file]) + " " +
      clean(r[k.category]) + " " +
      clean(r[k.subDepartment]) + " " +
      clean(r[k.department]) + " " +
      clean(r[k.channel]);

    return text.includes(term);
  });

  results.innerHTML = "";

  if(matches.length === 0){
    results.innerHTML = "<div class='card'>No results found</div>";
    return;
  }

  matches.slice(0,50).forEach(r => {
    results.innerHTML += `
      <div class="card">
        <a href="${r[k.link]}" target="_blank">
          📄 ${r[k.file]}
          <br>
          <small>${r[k.department]} → ${r[k.subDepartment]} → ${r[k.category]}</small>
        </a>
      </div>
    `;
  });

}

</script>

</body>
</html>
