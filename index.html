<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planogram Finder</title>

<style>
body { font-family: Arial; padding: 15px; background:#f4f6f8; }

select, input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

label {
  font-weight:bold;
  margin-top:10px;
  display:block;
}

.card {
  background:#fff;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.card a {
  text-decoration:none;
  font-weight:bold;
  color:#0b57d0;
}

#globalSearch {
  border: 2px solid #0b57d0;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>QLD Metcash - Planogram Directory</h2>

<!-- GLOBAL SEARCH ONLY -->
<label>🔎 Search All planograms</label>
<input type="text" id="globalSearch" placeholder="Search all planograms..." onkeyup="runGlobalSearch()">

<label>Channel</label>
<select id="channel" onchange="updateDepartments()"></select>

<label>Department</label>
<select id="department" onchange="updateSubDepartments()"></select>

<label>Sub-Department</label>
<select id="subDepartment" onchange="updateCategories()"></select>

<label>Category</label>
<select id="category" onchange="showFiles()"></select>

<div id="results"></div>

<script>

// ================= CSV LINK =================
const fileURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPSHnZioYj2Xdxx0CNi5VYlzlm0OL5aWAnr_eI9rSyboMnznDUyJzYt1DZ0Vret_CRqxO2aP8fDy9y/pub?output=csv";

let fileData = [];

// ================= CSV PARSER =================
function parseCSV(text){
  const rows = text.trim().split("\n");
  const headers = rows[0].split(",").map(h => h.replace(/^\uFEFF/, "").trim());

  return rows.slice(1).map(row => {
    const values = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    let obj = {};
    headers.forEach((h,i)=> obj[h] = values[i]?.replace(/"/g,""));
    return obj;
  });
}

// ================= LOAD =================
fetch(fileURL)
.then(r => r.text())
.then(text => {
  fileData = parseCSV(text);
  initChannels();
});

// ================= CLEAN =================
function clean(v){ return (v||"").toString().toLowerCase().trim(); }

// ================= CHANNEL =================
function initChannels(){
  const vals = [...new Set(fileData.map(r => r["Channel"]))];
  channel.innerHTML = "<option value=''>Select Channel</option>";
  vals.forEach(v => channel.innerHTML += `<option>${v}</option>`);
}

// ================= DEPARTMENT =================
function updateDepartments(){
  const vals = [...new Set(
    fileData
      .filter(r => clean(r["Channel"]) === clean(channel.value))
      .map(r => r["Department"])
  )];

  department.innerHTML = "<option value=''>Select Department</option>";
  vals.forEach(v => department.innerHTML += `<option>${v}</option>`);

  subDepartment.innerHTML = "";
  category.innerHTML = "";
  results.innerHTML = "";
}

// ================= SUB-DEPARTMENT =================
function updateSubDepartments(){
  const vals = [...new Set(
    fileData
      .filter(r =>
        clean(r["Channel"]) === clean(channel.value) &&
        clean(r["Department"]) === clean(department.value)
      )
      .map(r => r["Sub-Department"])
  )];

  subDepartment.innerHTML = "<option value=''>Select Sub-Department</option>";
  vals.forEach(v => subDepartment.innerHTML += `<option>${v}</option>`);

  category.innerHTML = "";
  results.innerHTML = "";
}

// ================= CATEGORY =================
function updateCategories(){
  const vals = [...new Set(
    fileData
      .filter(r =>
        clean(r["Channel"]) === clean(channel.value) &&
        clean(r["Department"]) === clean(department.value) &&
        clean(r["Sub-Department"]) === clean(subDepartment.value)
      )
      .map(r => r["Category"])
  )];

  category.innerHTML = "<option value=''>Select Category</option>";
  vals.forEach(v => category.innerHTML += `<option>${v}</option>`);

  results.innerHTML = "";
}

// ================= SHOW FILES =================
function showFiles(){
  const matches = fileData.filter(r =>
    clean(r["Channel"]) === clean(channel.value) &&
    clean(r["Department"]) === clean(department.value) &&
    clean(r["Sub-Department"]) === clean(subDepartment.value) &&
    clean(r["Category"]) === clean(category.value)
  );

  results.innerHTML = "";

  if(matches.length === 0){
    results.innerHTML = "<div class='card'>No files found</div>";
    return;
  }

  matches.forEach(r => {
    results.innerHTML += `
      <div class="card">
        <a href="${r["Link"]}" target="_blank">
          📄 ${r["File Name"]}
        </a>
      </div>
    `;
  });
}

// ================= GLOBAL SEARCH =================
function runGlobalSearch(){

  const term = clean(document.getElementById("globalSearch").value);

  if(term.length < 2){
    results.innerHTML = "";
    return;
  }

  const matches = fileData.filter(r => {

    const text =
      clean(r["File Name"]) + " " +
      clean(r["Category"]) + " " +
      clean(r["Sub-Department"]) + " " +
      clean(r["Department"]) + " " +
      clean(r["Channel"]);

    return text.includes(term);
  });

  results.innerHTML = "";

  if(matches.length === 0){
    results.innerHTML = "<div class='card'>No results found</div>";
    return;
  }

  matches.slice(0,50).forEach(r => {
    results.innerHTML += `
      <div class="card">
        <a href="${r["Link"]}" target="_blank">
          📄 ${r["File Name"]}
          <br>
          <small>${r["Department"]} → ${r["Sub-Department"]} → ${r["Category"]}</small>
        </a>
      </div>
    `;
  });

}

</script>

</body>
</html>
